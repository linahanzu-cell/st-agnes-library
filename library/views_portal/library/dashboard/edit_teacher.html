{% extends 'layout/base.html' %}
{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h2 style="color: #991b1b; margin-bottom: 25px;">EDIT TEACHER</h2>
    <div style="background: white; border-radius: 10px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 4px solid #991b1b;">
        <form method="post">
            {% csrf_token %}
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div>
                    <label style="font-size: 11px; font-weight: bold; color: #6b7280; display: block; margin-bottom: 5px;">FIRST NAME</label>
                    <input type="text" name="first_name" value="{{ teacher.first_name }}" required
                        style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; box-sizing: border-box;">
                </div>
                <div>
                    <label style="font-size: 11px; font-weight: bold; color: #6b7280; display: block; margin-bottom: 5px;">LAST NAME</label>
                    <input type="text" name="last_name" value="{{ teacher.last_name }}" required
                        style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; box-sizing: border-box;">
                </div>
                <div>
                    <label style="font-size: 11px; font-weight: bold; color: #6b7280; display: block; margin-bottom: 5px;">TEACHER ID</label>
                    <input type="text" name="teacher_id" value="{{ teacher.teacher_id }}" required
                        style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; box-sizing: border-box;">
                </div>
                <div>
                    <label style="font-size: 11px; font-weight: bold; color: #6b7280; display: block; margin-bottom: 5px;">EMAIL</label>
                    <input type="email" name="email" value="{{ teacher.email }}" required
                        style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; box-sizing: border-box;">
                </div>
                <div>
                    <label style="font-size: 11px; font-weight: bold; color: #6b7280; display: block; margin-bottom: 5px;">PHONE NUMBER</label>
                    <input type="text" name="phone_number" value="{{ teacher.phone_number }}" required
                        style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; box-sizing: border-box;">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="submit" style="background: #991b1b; color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer;">
                        SAVE CHANGES
                    </button>
                    <a href="{% url 'teachers_list' %}" style="background: #f3f4f6; color: #374151; padding: 12px 25px; border-radius: 6px; font-weight: bold; text-decoration: none;">
                        CANCEL
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
