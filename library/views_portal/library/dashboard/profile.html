{% extends 'layout/base.html' %}
{% block content %}
<h2 style="color: #1f2937; margin-bottom: 30px;">LIBRARIAN PROFILE</h2>

<div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); max-width: 600px;">
    <div style="display: flex; align-items: center; gap: 30px; margin-bottom: 30px;">
        <div style="width: 100px; height: 100px; background: #991b1b; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px;">
            <i class="fas fa-user-tie"></i>
        </div>
        <div>
            <h3 style="margin: 0; color: #111827;">{{ user.get_full_name|default:user.username }}</h3>
            <p style="margin: 5px 0; color: #991b1b; font-weight: bold;">Chief Librarian</p>
        </div>
    </div>

    <div style="border-top: 1px solid #f3f4f6; padding-top: 20px;">
        <p><strong>Username:</strong> {{ user.username }}</p>
        <p><strong>Email Address:</strong> {{ user.email|default:"Not set" }}</p>
        <p><strong>Last Login:</strong> {{ user.last_login|date:"D, d M Y" }}</p>
    </div>
    
    <button style="margin-top: 20px; background: #111827; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
        Edit Profile Information
    </button>
</div>
{% endblock %}
