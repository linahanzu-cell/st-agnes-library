<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>St. Agnes | Student Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; font-family: 'Segoe UI', sans-serif; background: #1f2937; }
    .left-panel {
        flex: 1;
        background: linear-gradient(135deg, #111827 0%, #991b1b 100%);
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; padding: 60px; position: relative; overflow: hidden;
    }
    .school-logo { text-align: center; z-index: 1; }
    .school-logo i { font-size: 80px; color: #ef4444; margin-bottom: 25px; display: block; }
    .school-name { font-size: 36px; font-weight: 900; color: white; letter-spacing: 4px; text-transform: uppercase; }
    .school-subtitle { font-size: 13px; color: #9ca3af; text-transform: uppercase; letter-spacing: 3px; margin-top: 8px; }
    .right-panel {
        width: 420px; background: white; display: flex; flex-direction: column;
        align-items: center; justify-content: center; padding: 60px 50px;
    }
    .login-header { text-align: center; margin-bottom: 35px; width: 100%; }
    .login-header h2 { font-size: 22px; color: #1f2937; font-weight: 900; margin-bottom: 8px; }
    .login-header p { color: #9ca3af; font-size: 13px; }
    .form-group { width: 100%; margin-bottom: 20px; }
    .form-group label { display: block; font-size: 11px; font-weight: bold; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .input-wrapper { position: relative; }
    .input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 14px; }
    .form-group input { width: 100%; padding: 12px 12px 12px 40px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px; color: #1f2937; transition: 0.3s; box-sizing: border-box; }
    .form-group input:focus { outline: none; border-color: #991b1b; box-shadow: 0 0 0 3px rgba(153,27,27,0.1); }
    .login-btn { width: 100%; padding: 14px; background: #991b1b; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
    .login-btn:hover { background: #7f1d1d; }
    .error-msg { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-bottom: 20px; width: 100%; text-align: center; }
    .footer-note { margin-top: 30px; color: #9ca3af; font-size: 12px; text-align: center; }
    .footer-note span { color: #991b1b; font-weight: bold; }
    @media (max-width: 768px) { .left-panel { display: none; } .right-panel { width: 100%; padding: 40px 30px; } }
</style>
</head>
<body>
<div class="left-panel">
    <div class="school-logo">
        <i class="fas fa-book-open"></i>
        <div class="school-name">ST. AGNES</div>
        <div class="school-subtitle">Student Library Portal</div>
    </div>
</div>
<div class="right-panel">
    <div class="login-header">
        <h2>STUDENT LOGIN</h2>
        <p>Enter your admission number to access the library</p>
    </div>
    {% if error %}
    <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    {% endif %}
    <form method="post" style="width: 100%;">
        {% csrf_token %}
        <div class="form-group">
            <label>Admission Number</label>
            <div class="input-wrapper">
                <i class="fas fa-id-card"></i>
                <input type="text" name="admission_number" placeholder="e.g. 202267" required autofocus>
            </div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
        </div>
        <button type="submit" class="login-btn">
            <i class="fas fa-sign-in-alt"></i> LOGIN
        </button>
    </form>
    <div class="footer-note">
        St. Agnes Shibuya School &copy; 2025<br>
        <span>Student Library Portal</span>
    </div>
</div>
</body>
</html>
