<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>St. Agnes | Set Password</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; background: #1f2937; }
    .card { background: white; border-radius: 16px; padding: 50px 40px; width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .card h2 { color: #991b1b; font-size: 22px; font-weight: 900; margin-bottom: 8px; text-align: center; }
    .card p { color: #6b7280; font-size: 13px; text-align: center; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 11px; font-weight: bold; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .input-wrapper { position: relative; }
    .input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
    .form-group input { width: 100%; padding: 12px 12px 12px 40px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
    .form-group input:focus { outline: none; border-color: #991b1b; }
    .btn { width: 100%; padding: 14px; background: #991b1b; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
    .btn:hover { background: #7f1d1d; }
    .error-msg { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-bottom: 20px; text-align: center; }
</style>
</head>
<body>
<div class="card">
    <h2><i class="fas fa-key" style="color: #991b1b;"></i> SET YOUR PASSWORD</h2>
    <p>Welcome {{ teacher.first_name }}! This is your first login. Please set a password.</p>
    {% if error %}
    <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>New Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="At least 6 characters" required>
            </div>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" name="confirm_password" placeholder="Repeat your password" required>
            </div>
        </div>
        <button type="submit" class="btn"><i class="fas fa-check"></i> SET PASSWORD & LOGIN</button>
    </form>
</div>
</body>
</html>
